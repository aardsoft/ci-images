name: Build and deploy containers

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-images:
    runs-on: ubuntu-latest
    strategy:
      # Allow other builds to continue if one fails
      fail-fast: false
      matrix:
        include:
          - tag: leap_arc
            dir: suse_leap_arc
          - tag: leap16_arc
            dir: suse_leap16_arc
          - tag: tumbleweed_arc
            dir: suse_tumbleweed_arc
    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v6

      - name: 'Login to GitHub Container Registry'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}

      - name: 'Build and Push containers'
        run: |
          docker build ${{ matrix.dir }} --tag ghcr.io/aardsoft/${{ matrix.tag }}:latest
          docker push ghcr.io/aardsoft/${{ matrix.tag }}:latest
